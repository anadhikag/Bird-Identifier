# Deploy Birdie backend to Azure App Service
#
# Strategy: Oryx-enabled ZIP Deploy (Azure-recommended)
# -------------------------------------------------------
# Oryx (SCM_DO_BUILD_DURING_DEPLOYMENT=true) is KEPT ENABLED.
# It is the standard, documented Azure App Service build system for Python.
#
# Previously, Oryx was the cause of the 3.1 GB output because
# requirements.txt used --extra-index-url, which does not prevent pip
# from resolving torch from PyPI (CUDA wheel, ~2.5 GB).
#
# That requirements.txt bug is now fixed: --index-url makes the PyTorch
# CPU wheel server the PRIMARY index, and torch is pinned with the +cpu
# local version suffix. Oryx will now install the CPU-only wheel (~180 MB)
# and the full venv will be ~350 MB — well within ZIP Deploy limits.
#
# Because Oryx handles dependency installation on Azure, this workflow
# only needs to:
#   1. Check out the repository.
#   2. Create a source + assets ZIP (no pre-built venv).
#   3. Deploy that ZIP to Azure.
#
# The startup command set in the Azure Portal needs no antenv prefix:
# Oryx activates its own virtualenv before running the startup command.
#
# Required GitHub Secrets (created by Azure Portal integration):
#   AZUREAPPSERVICE_CLIENTID_*
#   AZUREAPPSERVICE_TENANTID_*
#   AZUREAPPSERVICE_SUBSCRIPTIONID_*
#
# Required Azure App Service settings:
#   SCM_DO_BUILD_DURING_DEPLOYMENT = true  (default; set explicitly to
#     override any value left from previous debugging sessions)
#   Startup Command: gunicorn -w 1 -k uvicorn.workers.UvicornWorker
#                    --bind=0.0.0.0:$PORT backend.app:app

name: Deploy Birdie to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------------
  # BUILD — create a lean source ZIP for Oryx to build on Azure
  # --------------------------------------------------------------------------
  build:
    name: Package application source
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # We validate that requirements.txt resolves CPU-only torch wheels
      # BEFORE uploading to Azure, so a bad requirements change is caught
      # in CI rather than discovered after a failed deployment.
      - name: Set up Python 3.11 (for pre-flight validation only)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate CPU-only torch resolution (pre-flight check)
        run: |
          pip install --dry-run -r requirements.txt \
            2>&1 | grep -i "torch" | head -20
          # Install just torch to verify the +cpu wheel is selected
          pip install --quiet \
            --index-url https://download.pytorch.org/whl/cpu \
            "torch==2.12.1+cpu" --dry-run \
            && echo "CPU wheel resolves correctly."

      # Create the deployment ZIP.
      #
      # INCLUDED (everything Oryx and the runtime need):
      #   backend/          Python application package
      #   src/              ML pipeline modules (classifier, RAG, ingest)
      #   models/           Model checkpoint (82 MB, required at runtime)
      #   knowledge/        Species markdown files (RAG knowledge base)
      #   vector_db/        FAISS index + metadata (required at runtime)
      #   requirements.txt  Oryx reads this to run pip install
      #   startup.sh        Optional fallback startup script
      #
      # EXCLUDED (not needed at runtime on Azure):
      #   .git/             Version control internals
      #   venv/ antenv/     Local dev virtualenvs (Oryx creates its own)
      #   frontend/         React SPA — deploy separately to Static Web Apps
      #   data/             Training datasets
      #   outputs/          Experiment outputs
      #   test_images/      Test fixtures
      #   scripts/          Developer utilities
      #   __pycache__ *.pyc Bytecode (regenerated at runtime)
      #   .env              Local secrets (injected via App Settings on Azure)
      - name: Create source ZIP for Oryx deployment
        run: |
          zip -r deploy.zip . \
            --exclude ".git/*" \
            --exclude ".gitattributes" \
            --exclude "venv/*" \
            --exclude "antenv/*" \
            --exclude "frontend/*" \
            --exclude "data/*" \
            --exclude "outputs/*" \
            --exclude "test_images/*" \
            --exclude "scripts/*" \
            --exclude "*/__pycache__/*" \
            --exclude "*.pyc" \
            --exclude ".env" \
            --exclude "*.DS_Store"

      - name: Report deployment ZIP size
        run: |
          du -sh deploy.zip
          echo "Contents breakdown:"
          unzip -l deploy.zip | awk '{print $4}' | \
            grep -v "^$\|^Name\|^----" | \
            sed 's|/[^/]*$||' | sort | uniq -c | sort -rn | head -20

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: birdie-backend
          path: deploy.zip
          retention-days: 1

      - name: Clean up frontend before deployment
        run: |
          rm -rf frontend
          rm -rf node_modules

  # --------------------------------------------------------------------------
  # DEPLOY — push to Azure; Oryx installs dependencies from requirements.txt
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write   # Required for OIDC / Workload Identity Federation
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: birdie-backend

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2A1030C27392410D9B36898B5B89C8B3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3C8E5373AC9B4674927EBF07E22EAD16 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2AA3BA7DE4D348FEB6295378C0C057F8 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'birdie-anadhika'
          slot-name: 'Production'
          package: deploy.zip